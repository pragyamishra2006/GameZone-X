<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Speed Clicker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(135deg,#081221,#0f3460);

    overflow:hidden;
}

/* Glow Background */

body::before{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:#00bfff22;

    border-radius:50%;

    filter:blur(120px);

    top:-120px;
    left:-120px;
}

body::after{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:#ff4d6d22;

    border-radius:50%;

    filter:blur(120px);

    bottom:-120px;
    right:-120px;
}

/* Main Container */

.container{

    position:relative;

    z-index:10;

    width:95%;
    max-width:850px;

    background:#111827ee;

    border:2px solid #00bfff33;

    border-radius:35px;

    padding:40px;

    text-align:center;

    backdrop-filter:blur(12px);

    box-shadow:
    0 0 40px #00bfff33,
    0 0 70px #00bfff22;
}

/* Heading */

h1{

    font-size:4rem;

    margin-bottom:20px;

    color:#00bfff;

    text-shadow:
    0 0 15px #00bfff,
    0 0 40px #00bfff;
}

/* Stats */

.stats{

    display:flex;

    justify-content:center;

    gap:25px;

    flex-wrap:wrap;

    margin-bottom:30px;
}

.card{

    background:#0f1f3d;

    padding:18px 30px;

    border-radius:20px;

    border:2px solid #00bfff33;

    min-width:200px;

    box-shadow:0 0 20px #00bfff22;
}

.card h2{

    color:#00bfff;

    margin-bottom:10px;
}

.card p{

    font-size:2rem;

    font-weight:bold;

    color:white;
}

/* Click Button */

.click-btn{

    width:260px;
    height:260px;

    border:none;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #00bfff,
    #0066ff);

    color:white;

    font-size:2rem;

    font-weight:bold;

    cursor:pointer;

    transition:0.15s;

    box-shadow:
    0 0 25px #00bfff88,
    0 0 60px #00bfff55;

    margin-top:20px;
}

.click-btn:hover{

    transform:scale(1.05);

    box-shadow:
    0 0 40px #00bfff,
    0 0 90px #00bfff88;
}

.click-btn:active{

    transform:scale(0.93);
}

/* Game Over */

.game-over{

    margin-top:25px;

    font-size:2rem;

    color:#22c55e;

    font-weight:bold;

    min-height:40px;

    text-shadow:0 0 10px #22c55e;
}

/* Buttons */

.buttons{

    margin-top:35px;

    display:flex;

    justify-content:center;

    gap:25px;

    flex-wrap:wrap;
}

button{

    padding:18px 45px;

    border:none;

    border-radius:40px;

    font-size:1.2rem;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

/* Restart */

.restart{

    background:#22c55e;

    color:white;

    box-shadow:0 0 20px #22c55e88;
}

.restart:hover{

    transform:translateY(-4px) scale(1.05);

    box-shadow:0 0 35px #22c55e;
}

/* Home */

.home{

    background:#00bfff;

    color:white;

    box-shadow:0 0 20px #00bfff88;
}

.home:hover{

    transform:translateY(-4px) scale(1.05);

    box-shadow:0 0 35px #00bfff;
}

/* Instructions */

.instructions{

    margin-top:20px;

    color:white;

    font-size:1.1rem;
}

/* Responsive */

@media(max-width:700px){

    h1{

        font-size:3rem;
    }

    .click-btn{

        width:200px;
        height:200px;

        font-size:1.5rem;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>⚡ Speed Clicker</h1>

<div class="stats">

<div class="card">

<h2>Time Left</h2>

<p id="time">10</p>

</div>

<div class="card">

<h2>Score</h2>

<p id="score">0</p>

</div>

<div class="card">

<h2>High Score</h2>

<p id="highScore">0</p>

</div>

</div>

<button class="click-btn"
id="clickBtn">

CLICK FAST!

</button>

<div class="game-over"
id="message">

</div>

<div class="buttons">

<button class="restart"
onclick="restartGame()">

🔄 Restart

</button>

<button class="home"
onclick="window.location.href='../index.html'">

🏠 Home

</button>

</div>

<p class="instructions">
Click As Fast As Possible Before Time Ends 🚀
</p>

</div>

<script>

let score = 0;

let timeLeft = 10;

let gameStarted = false;

let timer;

const clickBtn =
document.getElementById("clickBtn");

const scoreText =
document.getElementById("score");

const timeText =
document.getElementById("time");

const message =
document.getElementById("message");

let highScore =
localStorage.getItem(
    "speedClickHigh"
) || 0;

document.getElementById(
    "highScore"
).innerText = highScore;

/* CLICK EVENT */

clickBtn.addEventListener(
    "click",
    ()=>{

        if(timeLeft <= 0)
            return;

        if(!gameStarted){

            startTimer();

            gameStarted = true;
        }

        score++;

        scoreText.innerText = score;

        /* Glow Animation */

        clickBtn.style.transform =
        "scale(0.9)";

        setTimeout(()=>{

            clickBtn.style.transform =
            "scale(1)";

        },80);
    }
);

/* TIMER */

function startTimer(){

    timer = setInterval(()=>{

        timeLeft--;

        timeText.innerText =
        timeLeft;

        if(timeLeft <= 0){

            clearInterval(timer);

            endGame();
        }

    },1000);
}

/* GAME OVER */

function endGame(){

    clickBtn.disabled = true;

    clickBtn.style.opacity = "0.6";

    message.innerText =
    "🔥 Final Score: " + score;

    if(score > highScore){

        highScore = score;

        localStorage.setItem(
            "speedClickHigh",
            highScore
        );

        document.getElementById(
            "highScore"
        ).innerText = highScore;

        message.innerText +=
        " | NEW HIGH SCORE 🎉";
    }
}

/* RESTART */

function restartGame(){

    clearInterval(timer);

    score = 0;

    timeLeft = 10;

    gameStarted = false;

    scoreText.innerText = score;

    timeText.innerText = timeLeft;

    message.innerText = "";

    clickBtn.disabled = false;

    clickBtn.style.opacity = "1";
}

</script>

</body>

</html>
