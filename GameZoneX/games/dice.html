<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dice Roller</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(135deg,#081221,#0f3460);

    overflow:hidden;
}

/* Background Glow */

body::before{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:#00bfff22;

    border-radius:50%;

    filter:blur(120px);

    top:-120px;
    left:-120px;
}

body::after{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:#ff4d6d22;

    border-radius:50%;

    filter:blur(120px);

    bottom:-120px;
    right:-120px;
}

/* Main Container */

.container{

    position:relative;

    z-index:10;

    width:90%;
    max-width:700px;

    background:#111827ee;

    border:2px solid #00bfff33;

    border-radius:35px;

    padding:45px;

    text-align:center;

    backdrop-filter:blur(12px);

    box-shadow:
    0 0 40px #00bfff33,
    0 0 70px #00bfff22;
}

/* Heading */

h1{

    font-size:4rem;

    margin-bottom:20px;

    color:#00bfff;

    text-shadow:
    0 0 15px #00bfff,
    0 0 40px #00bfff;
}

/* Dice Box */

.dice-box{

    margin:35px auto;

    width:240px;

    height:240px;

    background:#091428;

    border-radius:35px;

    display:flex;

    justify-content:center;

    align-items:center;

    border:4px solid #00bfff55;

    box-shadow:
    inset 0 0 25px #00bfff22,
    0 0 25px #00bfff33;

    transition:0.3s;
}

.dice{

    font-size:8rem;

    animation:glow 1s infinite alternate;
}

/* Glow Animation */

@keyframes glow{

    from{

        text-shadow:
        0 0 10px #00bfff,
        0 0 25px #00bfff;
    }

    to{

        text-shadow:
        0 0 25px #00bfff,
        0 0 50px #00bfff;
    }
}

/* Roll Count */

.stats{

    display:flex;

    justify-content:center;

    gap:25px;

    flex-wrap:wrap;

    margin-bottom:30px;
}

.card{

    background:#0f1f3d;

    padding:18px 30px;

    border-radius:20px;

    border:2px solid #00bfff33;

    min-width:200px;

    box-shadow:0 0 20px #00bfff22;
}

.card h2{

    color:#00bfff;

    margin-bottom:10px;
}

.card p{

    font-size:2rem;

    font-weight:bold;
}

/* Buttons */

.buttons{

    margin-top:30px;

    display:flex;

    justify-content:center;

    gap:25px;

    flex-wrap:wrap;
}

button{

    padding:18px 45px;

    border:none;

    border-radius:40px;

    font-size:1.2rem;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

/* Roll Button */

.roll{

    background:#22c55e;

    color:white;

    box-shadow:0 0 20px #22c55e88;
}

.roll:hover{

    transform:translateY(-4px) scale(1.05);

    box-shadow:0 0 35px #22c55e;
}

/* Home Button */

.home{

    background:#00bfff;

    color:white;

    box-shadow:0 0 20px #00bfff88;
}

.home:hover{

    transform:translateY(-4px) scale(1.05);

    box-shadow:0 0 35px #00bfff;
}

/* Result Text */

.result{

    margin-top:25px;

    font-size:2rem;

    color:#22c55e;

    font-weight:bold;

    text-shadow:0 0 10px #22c55e;
}

/* Responsive */

@media(max-width:700px){

    h1{

        font-size:3rem;
    }

    .dice-box{

        width:180px;
        height:180px;
    }

    .dice{

        font-size:6rem;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>🎲 Dice Roller</h1>

<div class="stats">

<div class="card">

<h2>Total Rolls</h2>

<p id="rollCount">0</p>

</div>

<div class="card">

<h2>Highest Roll</h2>

<p id="highRoll">0</p>

</div>

</div>

<div class="dice-box">

<div class="dice" id="dice">
🎲
</div>

</div>

<div class="result" id="result">
Press Roll Dice
</div>

<div class="buttons">

<button class="roll" onclick="rollDice()">
🎲 Roll Dice
</button>

<button class="home"
onclick="window.location.href='../index.html'">

🏠 Home

</button>

</div>

</div>

<script>

const dice = document.getElementById("dice");

const result = document.getElementById("result");

const rollCountText =
document.getElementById("rollCount");

const highRollText =
document.getElementById("highRoll");

let rollCount = 0;

let highRoll =
localStorage.getItem("diceHighRoll") || 0;

highRollText.innerText = highRoll;

const diceFaces = [

"⚀",
"⚁",
"⚂",
"⚃",
"⚄",
"⚅"

];

function rollDice(){

    dice.style.transform = "rotate(360deg)";

    setTimeout(()=>{

        const random =
        Math.floor(Math.random()*6);

        const value = random + 1;

        dice.innerText = diceFaces[random];

        result.innerText =
        `You Rolled ${value}`;

        rollCount++;

        rollCountText.innerText =
        rollCount;

        if(value > highRoll){

            highRoll = value;

            localStorage.setItem(
                "diceHighRoll",
                highRoll
            );

            highRollText.innerText =
            highRoll;
        }

    },200);
}

</script>

</body>

</html>
