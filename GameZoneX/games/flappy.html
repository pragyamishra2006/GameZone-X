<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flappy Bird</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(135deg,#081221,#0f3460);

    overflow:hidden;
}

/* Background Glow */

body::before{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:#00bfff22;

    border-radius:50%;

    filter:blur(120px);

    top:-120px;
    left:-120px;
}

body::after{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:#22c55e22;

    border-radius:50%;

    filter:blur(120px);

    bottom:-120px;
    right:-120px;
}

/* Main Container */

.container{

    position:relative;

    z-index:10;

    width:95%;
    max-width:850px;

    background:#111827ee;

    border:2px solid #00bfff33;

    border-radius:35px;

    padding:35px;

    text-align:center;

    backdrop-filter:blur(12px);

    box-shadow:
    0 0 40px #00bfff33,
    0 0 70px #00bfff22;
}

/* Heading */

h1{

    font-size:4rem;

    margin-bottom:20px;

    color:#00bfff;

    text-shadow:
    0 0 15px #00bfff,
    0 0 40px #00bfff;
}

/* Score Board */

.stats{

    display:flex;

    justify-content:center;

    gap:25px;

    flex-wrap:wrap;

    margin-bottom:25px;
}

.card{

    background:#0f1f3d;

    padding:18px 30px;

    border-radius:20px;

    border:2px solid #00bfff33;

    min-width:220px;

    box-shadow:0 0 20px #00bfff22;
}

.card h2{

    color:#00bfff;

    margin-bottom:10px;
}

.card p{

    font-size:2rem;

    font-weight:bold;
}

/* Canvas */

canvas{

    background:
    linear-gradient(to bottom,
    #4fc3f7,
    #81d4fa);

    border-radius:25px;

    border:4px solid #00bfff;

    box-shadow:
    0 0 25px #00bfff55;
}

/* Buttons */

.buttons{

    margin-top:30px;

    display:flex;

    justify-content:center;

    gap:25px;

    flex-wrap:wrap;
}

button{

    padding:18px 45px;

    border:none;

    border-radius:40px;

    font-size:1.2rem;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

/* Restart Button */

.restart{

    background:#22c55e;

    color:white;

    box-shadow:0 0 20px #22c55e88;
}

.restart:hover{

    transform:translateY(-4px) scale(1.05);

    box-shadow:0 0 35px #22c55e;
}

/* Home Button */

.home{

    background:#00bfff;

    color:white;

    box-shadow:0 0 20px #00bfff88;
}

.home:hover{

    transform:translateY(-4px) scale(1.05);

    box-shadow:0 0 35px #00bfff;
}

/* Instructions */

.instructions{

    margin-top:20px;

    color:white;

    font-size:1.1rem;
}

/* Responsive */

@media(max-width:800px){

    canvas{

        width:100%;
        height:auto;
    }

    h1{

        font-size:3rem;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>🐦 Flappy Bird</h1>

<div class="stats">

<div class="card">

<h2>Score</h2>

<p id="score">0</p>

</div>

<div class="card">

<h2>High Score</h2>

<p id="highScore">0</p>

</div>

</div>

<canvas id="gameCanvas"
width="700"
height="500"></canvas>

<div class="buttons">

<button class="restart"
onclick="restartGame()">

🔄 Restart

</button>

<button class="home"
onclick="window.location.href='../index.html'">

🏠 Home

</button>

</div>

<p class="instructions">
Press SPACEBAR to Fly 🚀
</p>

</div>

<script>

const canvas =
document.getElementById("gameCanvas");

const ctx =
canvas.getContext("2d");

let bird;
let pipes;
let score;
let gravity;
let lift;
let gameOver;
let animationId;

let highScore =
localStorage.getItem("flappyHigh") || 0;

document.getElementById(
    "highScore"
).innerText = highScore;

/* START GAME */

function init(){

    bird = {

        x:120,
        y:250,
        radius:22,
        velocity:0
    };

    pipes = [];

    score = 0;

    /* VERY EASY SETTINGS */

    gravity = 0.18;

    lift = -4.5;

    gameOver = false;

    document.getElementById(
        "score"
    ).innerText = score;

    pipes.push(createPipe());

    cancelAnimationFrame(animationId);

    update();
}

/* CREATE PIPE */

function createPipe(){

    const gap = 240;

    const topHeight =
    Math.random()*180 + 50;

    return {

        x:canvas.width,

        top:topHeight,

        bottom:topHeight + gap,

        width:75,

        passed:false
    };
}

/* CONTROLS */

document.addEventListener(
    "keydown",
    e=>{

        if(
            e.code==="Space" &&
            !gameOver
        ){

            bird.velocity = lift;
        }
    }
);

/* DRAW BIRD */

function drawBird(){

    ctx.beginPath();

    ctx.arc(
        bird.x,
        bird.y,
        bird.radius,
        0,
        Math.PI*2
    );

    ctx.fillStyle = "#ffeb3b";

    ctx.shadowColor = "#ffeb3b";

    ctx.shadowBlur = 25;

    ctx.fill();

    ctx.closePath();

    /* Eye */

    ctx.beginPath();

    ctx.arc(
        bird.x + 8,
        bird.y - 5,
        4,
        0,
        Math.PI*2
    );

    ctx.fillStyle = "black";

    ctx.fill();

    ctx.closePath();

    ctx.shadowBlur = 0;
}

/* DRAW PIPES */

function drawPipes(){

    pipes.forEach(pipe=>{

        ctx.fillStyle = "#22c55e";

        ctx.shadowColor = "#22c55e";

        ctx.shadowBlur = 20;

        /* Top Pipe */

        ctx.fillRect(
            pipe.x,
            0,
            pipe.width,
            pipe.top
        );

        /* Bottom Pipe */

        ctx.fillRect(
            pipe.x,
            pipe.bottom,
            pipe.width,
            canvas.height
        );

        ctx.shadowBlur = 0;
    });
}

/* GAME LOOP */

function update(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    /* BIRD MOVEMENT */

    bird.velocity += gravity;

    bird.velocity *= 0.96;

    bird.y += bird.velocity;

    drawBird();

    /* DRAW PIPES */

    drawPipes();

    pipes.forEach(pipe=>{

        /* VERY SLOW SPEED */

        pipe.x -= 1.2;

        /* SCORE */

        if(
            !pipe.passed &&
            pipe.x + pipe.width < bird.x
        ){

            pipe.passed = true;

            score++;

            document.getElementById(
                "score"
            ).innerText = score;

            if(score > highScore){

                highScore = score;

                localStorage.setItem(
                    "flappyHigh",
                    highScore
                );

                document.getElementById(
                    "highScore"
                ).innerText = highScore;
            }
        }

        /* COLLISION */

        if(

            bird.x + bird.radius >
            pipe.x &&

            bird.x - bird.radius <
            pipe.x + pipe.width &&

            (
                bird.y - bird.radius <
                pipe.top ||

                bird.y + bird.radius >
                pipe.bottom
            )
        ){

            endGame();
        }
    });

    /* REMOVE PIPES */

    pipes = pipes.filter(
        pipe => pipe.x + pipe.width > 0
    );

    /* ADD NEW PIPE */

    if(
        pipes[pipes.length-1].x <
        canvas.width - 420
    ){

        pipes.push(createPipe());
    }

    /* BORDER COLLISION */

    if(

        bird.y + bird.radius >
        canvas.height ||

        bird.y - bird.radius < 0
    ){

        endGame();
    }

    if(!gameOver){

        animationId =
        requestAnimationFrame(update);
    }
}

/* GAME OVER */

function endGame(){

    gameOver = true;

    ctx.fillStyle =
    "rgba(0,0,0,0.6)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle = "white";

    ctx.font = "50px Arial";

    ctx.fillText(
        "GAME OVER",
        180,
        220
    );

    ctx.font = "35px Arial";

    ctx.fillText(
        "Score: " + score,
        260,
        290
    );

    ctx.fillText(
        "High Score: " + highScore,
        200,
        350
    );
}

/* RESTART */

function restartGame(){

    init();
}

/* START GAME */

init();

</script>

</body>

</html>
