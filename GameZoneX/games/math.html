<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Quiz Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    overflow:hidden;
    color:white;
}

.quiz-container{
    width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 35px rgba(0,255,255,0.15);
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{
        transform:translateY(20px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:12px 18px;
    border-radius:15px;
    text-align:center;
    min-width:90px;
    box-shadow:0 0 15px rgba(255,255,255,0.05);
}

.card h3{
    font-size:14px;
    color:#94a3b8;
}

.card p{
    font-size:20px;
    margin-top:5px;
    font-weight:bold;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:32px;
    color:#38bdf8;
}

.question{
    text-align:center;
    font-size:42px;
    margin-bottom:25px;
    font-weight:bold;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
    font-size:20px;
    text-align:center;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    gap:12px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:15px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn{
    background:linear-gradient(45deg,#06b6d4,#3b82f6);
    color:white;
}

.submit-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #38bdf8;
}

.home-btn{
    background:#f43f5e;
    color:white;
}

.home-btn:hover{
    transform:scale(1.05);
}

.new-btn{
    background:#22c55e;
    color:white;
}

.new-btn:hover{
    transform:scale(1.05);
}

.result{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    min-height:30px;
}

.streak-fire{
    color:orange;
}

</style>
</head>

<body>

<div class="quiz-container">

    <div class="top-bar">

        <div class="card">
            <h3>Score</h3>
            <p id="score">0</p>
        </div>

        <div class="card">
            <h3>Streak 🔥</h3>
            <p id="streak" class="streak-fire">0</p>
        </div>

        <div class="card">
            <h3>Timer ⏱</h3>
            <p id="timer">15</p>
        </div>

    </div>

    <h1>Math Quiz</h1>

    <div class="question" id="question">
        5 + 3
    </div>

    <input type="number" id="answer" placeholder="Your Answer">

    <div class="buttons">
        <button class="submit-btn" onclick="checkAnswer()">Submit</button>
    </div>

    <div class="buttons" style="margin-top:12px;">
        <button class="home-btn" onclick="goHome()">🏠 Home</button>
        <button class="new-btn" onclick="newGame()">🎮 New Game</button>
    </div>

    <div class="result" id="result"></div>

</div>

<script>

let num1, num2, correctAnswer;
let score = 0;
let streak = 0;
let time = 15;
let timer;

function generateQuestion(){
    num1 = Math.floor(Math.random()*20)+1;
    num2 = Math.floor(Math.random()*20)+1;

    correctAnswer = num1 + num2;

    document.getElementById("question").innerHTML =
        `${num1} + ${num2}`;

    document.getElementById("answer").value = "";

    resetTimer();
}

function checkAnswer(){

    let userAnswer =
        Number(document.getElementById("answer").value);

    let result = document.getElementById("result");

    if(userAnswer === correctAnswer){

        score++;
        streak++;

        result.innerHTML = "✅ Correct!";
        result.style.color = "#22c55e";

    }else{

        streak = 0;

        result.innerHTML =
            `❌ Wrong! Answer was ${correctAnswer}`;
        result.style.color = "#f43f5e";
    }

    document.getElementById("score").innerHTML = score;
    document.getElementById("streak").innerHTML = streak;

    generateQuestion();
}

function goHome(){
    window.location.href = "index.html";
}

function newGame(){
    score = 0;
    streak = 0;

    document.getElementById("score").innerHTML = score;
    document.getElementById("streak").innerHTML = streak;

    generateQuestion();
}

function startTimer(){

    timer = setInterval(()=>{

        time--;

        document.getElementById("timer").innerHTML = time;

        if(time <= 0){

            streak = 0;

            document.getElementById("streak").innerHTML = streak;

            generateQuestion();
        }

    },1000);
}

function resetTimer(){

    clearInterval(timer);

    time = 15;

    document.getElementById("timer").innerHTML = time;

    startTimer();
}

generateQuestion();

</script>

</body>
</html>
