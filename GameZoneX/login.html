<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameZone-X Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(135deg,#020617,#0f172a,#111827);

overflow:hidden;

position:relative;

}

/* BACKGROUND GLOW */

.glow{

position:absolute;

width:500px;
height:500px;

background:#38bdf8;

filter:blur(180px);

opacity:0.2;

border-radius:50%;

top:-150px;
left:-150px;

}

/* LOGIN CARD */

.login-card{

width:430px;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.1);

backdrop-filter:blur(18px);

padding:45px;

border-radius:30px;

text-align:center;

box-shadow:0 0 50px rgba(0,0,0,0.5);

z-index:2;

animation:fade 0.8s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

font-size:70px;

margin-bottom:10px;

}

h1{

font-size:45px;

color:#38bdf8;

margin-bottom:10px;

}

p{

color:#cbd5e1;

margin-bottom:35px;

font-size:18px;

}

.input-box{

margin-bottom:22px;

}

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:16px;

background:#1e293b;

color:white;

font-size:18px;

transition:0.3s;

}

input:focus{

box-shadow:0 0 15px rgba(56,189,248,0.7);

}

/* BUTTON */

button{

width:100%;

padding:18px;

border:none;

border-radius:16px;

font-size:22px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(45deg,#06b6d4,#3b82f6);

color:white;

transition:0.3s;

margin-top:10px;

}

button:hover{

transform:scale(1.03);

box-shadow:0 0 25px rgba(56,189,248,0.7);

}

/* FOOTER */

.footer{

margin-top:25px;

font-size:15px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="login-card">

<div class="logo">🎮</div>

<h1>GameZone-X</h1>

<p>Enter your details and start gaming</p>

<div class="input-box">

<input type="text"
id="name"
placeholder="Enter Username">

</div>

<div class="input-box">

<input type="email"
id="email"
placeholder="Enter Email">

</div>

<button onclick="login()">
🚀 START GAMING
</button>

<div class="footer">

Your Ultimate Gaming Hub

</div>

</div>

<script>

function login(){

let name =
document.getElementById("name").value;

let email =
document.getElementById("email").value;

if(name === "" || email === ""){

alert("Please fill all details");

return;

}

localStorage.setItem("username",name);

localStorage.setItem("email",email);

localStorage.setItem("gamesPlayed",0);

localStorage.setItem("highestStreak",0);

localStorage.setItem("totalScore",0);

window.location.href = "index.html";

}

</script>

</body>

</html>
